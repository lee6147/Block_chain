  <script>
    var walletProvider = null;

    // 유틸: 요소 선택 헬퍼

    // ──────────────────────────────────────────
    // Card 1: MetaMask 지갑 연결 (구현 예시)
    // ──────────────────────────────────────────
    $("btnConnect").addEventListener("click", async function () {
      if (typeof window.ethereum === "undefined") {
        alert("MetaMask가 설치되어 있지 않습니다.");
        return;
      }
      try {
        walletProvider = new ethers.BrowserProvider(window.ethereum);
        walletSigner = await walletProvider.getSigner();
        walletAddress = await walletSigner.getAddress();
        $("walletInfo").textContent = "연결됨: " + walletAddress;

        // TODO: walletProvider.getBalance(walletAddress) 로 잔액을 조회하세요
        // TODO: walletProvider.getTransactionCount(walletAddress) 로 논스를 조회하세요
      } catch (err) {
        console.error(err);
        $("walletInfo").textContent = "연결 실패: " + err.message;
      }
    });
